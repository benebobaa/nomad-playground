---
- name: Ensure deps
  apt:
    name: [curl, gnupg, ca-certificates, software-properties-common]
    state: present
    update_cache: true

# --- HashiCorp repo setup (official docs)
- name: Ensure apt keyrings dir exists
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Install HashiCorp GPG key
  ansible.builtin.apt_key:
    url: "{{ hashicorp_gpg }}"
    keyring: /usr/share/keyrings/hashicorp-archive-keyring.gpg
    state: present

- name: Ensure HashiCorp GPG permissions
  ansible.builtin.file:
    path: /usr/share/keyrings/hashicorp-archive-keyring.gpg
    mode: '0644'

- name: Add HashiCorp apt repo
  ansible.builtin.apt_repository:
    repo: "{{ hashicorp_repo }}"
    filename: hashicorp
    state: present

- name: Ensure HashiCorp repo permissions
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/hashicorp.list
    mode: '0644'

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Nomad
  apt:
    name: "{{ nomad_package }}"
    state: present

# --- Nomad config dir
- name: Create config dir
  file:
    path: /etc/nomad.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Drop sysctl for bridge & conntrack (good for Docker networking)
  copy:
    dest: /etc/sysctl.d/99-nomad-sysctl.conf
    src: 99-nomad-sysctl.conf
  notify: Reload sysctl
  when: install_docker

# --- Docker install (optional for clients)
- name: Install Docker (engine + CLI)
  block:
    - name: Install Docker pre-reqs
      apt:
        name: [apt-transport-https, ca-certificates, gnupg]
        state: present
        update_cache: true

    - name: Docker GPG
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args: { creates: /etc/apt/keyrings/docker.gpg }

    - name: Docker repo
      copy:
        dest: /etc/apt/sources.list.d/docker.list
        mode: '0644'
        content: |
          deb [arch={{ (ansible_architecture == 'aarch64') | ternary('arm64','amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: "{{ docker_pkg_state }}"
        update_cache: true

    - name: Enable & start Docker
      systemd:
        name: docker
        enabled: true
        state: started
  when: install_docker

# --- Nomad configs
- name: Render server config
  template:
    src: templates/nomad-server.hcl.j2
    dest: /etc/nomad.d/server.hcl
    mode: '0644'
  when: nomad_is_server|bool

- name: Render client config
  template:
    src: templates/nomad-client.hcl.j2
    dest: /etc/nomad.d/client.hcl
    mode: '0644'
  when: nomad_is_client|bool

- name: Create data dir
  file:
    path: /var/lib/nomad
    state: directory
    mode: '0755'

- name: Enable & start Nomad
  systemd:
    name: nomad
    daemon_reload: true
    enabled: true
    state: started

